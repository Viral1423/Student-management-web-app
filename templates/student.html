<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALl Students List</title>
</head>
<style>
body {
    background-color: #0D0D0D;
    font-family: Arial;
    color: antiquewhite;
}

/* Table styling */
table {
    border: 1px solid lightslategrey;
    width: 70%;
    text-align: center;
    margin: 40px auto;
    border-collapse: collapse;
}

/* Cells */
th, td {
    padding: 12px;
    border: 1px solid #333;
}

/* Header */
th {
    background-color: #111;
}

/* Links */
a {
    color: greenyellow;
    text-decoration: none;
    font-weight: bold;
}

/* Back button */
.back {
    text-align: center;
    margin-top: 20px;
}
tr:hover {
    background-color: #1a1a1a;
}
</style>
<body>

    <table cellpadding="10px" border="1px" >
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Phy_marks</th>
            <th>Maths_marks</th>
            <th>Stats_marks</th>
            <th>Total_marks</th>
            <th>Percentage</th>
            <th>Grade</th>
        </tr>
        {%for s in students%}
       <tr>
            <td>{{s[0]}}</td>
            <td>{{s[1]}}</td>
            <td>{{s[2]}}</td>
            <td>{{s[3]}}</td>
            <td>{{s[4]}}</td>
            <td>{{s[5]}}</td>
            <td>{{s[6]}}</td>
            <td>{{s[7]}}</td>
            <td><a href="/edit/{{s[1]}}">Edit</a></td>
        </tr>
        {%endfor%}
    </table>
<div class="back">
    <a href="/">⬅ Go Back</a>
</div>
    
</body>
</html>
